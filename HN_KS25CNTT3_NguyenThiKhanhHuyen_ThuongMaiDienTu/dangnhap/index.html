<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./index.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>
<body>
    <div class="signupContainer">
    <h1>Đăng nhập</h1>
    <p class="subtitle">Đăng nhập tài khoản để sử dụng hệ thống quản lý.</p>
    
    <form id="signupForm" action="">
        <div class="row">
            <div class="inputGroup">
                <label>Email</label>
                <input id="userName" type="text" placeholder="Nhập email của bạn" >
                <div class="error-msg" id="error-userName"></div>
            </div>
            <div class="inputGroup">
                <label>Mật khẩu</label>
                <input id="password" type="password" placeholder="Nhập mật khẩu" >
                <div class="error-msg" id="error-password"></div>
            </div>
        </div>

        <div class="checkboxGroup">
            <div class="checkbox-item">
                <input type="checkbox" id="remember">
                <label for="remember">Nhớ tài khoản</label>
            </div>
            <a href="#">Quên mật khẩu?</a>
        </div>

        <button type="submit" class="btn-signup" style="color: #fff;">Đăng Nhập</button>
    </form>

    <p class="footerText">Bạn chưa có tài khoản? <a href="../dangky/" style="text-decoration: none; color: #2563eb;">Đăng ký</a></p>
</div>
<script src="./script.js"></script>
</body>
</html>
